<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="cssreset.css" />
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chair Factory</title>
</head>

<body>
    <div class="heading">
        <h1 class="factory-name">Your Chair Factory</h1>
        <button type="button" class="rename">Rename</button>
        <input type="text" class="name"></input>
        <h5 class="money">You have: 0 dollars</h5>
        <h5 class="chairs">You have produced: 0 chairs</h5>
        <p class="upgrade-label">Upgrades:</p>
    </div>
    <div class="factory">
        <div class="production">
            <p class="wood-prod-timer">3.25s</p>
            <p class="wood">Wooden Chair: 0 ($1.50)</p>
            <button type="button" class="wood-produce">Produce</button>
            <p class="cloth-prod-timer">10s</p>
            <button type="button" class="cloth-prod-timer cloth-unlock">Unlock ($25)</button>
            <p class="cloth">Cloth Chair: 0 ($6.50)</p>
            <button type="button" class="cloth-produce">Produce</button>
        </div>
        <div class="upgrades">
            <button type="button" class="wood-automate">Automate Production: $120</button>
            <button type="button" class="wood-prod-time">Reduce Time: $5</button>
            <p class="seperator">------------------------------------</p>
            <button type="button" class="cloth-automate">Automate Production: $550</button>
            <button type="button" class="cloth-prod-time">Reduce Time: $35</button>
            <p class="seperator">------------------------------------</p>
        </div>
    </div>
    <script type="text/javascript" src="acr.js"></script>
</body>

</html>
